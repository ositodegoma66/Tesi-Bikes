<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESI Bikes</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav id="navbar">
        <div id="logo">🚲 TESI Bikes</div>
        <span id="estado-live">● EN VIVO</span>
    </nav>

    <div id="pestanas">
        <button id="tab-mapa" class="tab activa" onclick="mostrarSeccion('mapa')">🗺️ Mapa</button>
        <button id="tab-bicicletas" class="tab" onclick="mostrarSeccion('bicicletas')">🚲 Bicicletas</button>
        <button id="tab-qr" class="tab" onclick="mostrarSeccion('qr')">📱 Escanear QR</button>
    </div>

    <section id="seccion-mapa" class="seccion activa">
        <div id="mapa"></div>
    </section>

    <section id="seccion-bicicletas" class="seccion">
        <h2>Bicicletas</h2>
        <div id="lista-bicicletas"></div>
    </section>

    <section id="seccion-qr" class="seccion">
    <div id="contenedor-qr">
        <h2>Escanea el QR</h2>
        <p>Apunta tu cámara al código QR de la bicicleta</p>
        <div id="info-bici"></div>
    </div>
</section>


    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>

</body>
</html>
